<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LENSTORE - HayDay Tools</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  text-align: center;
}

/* CONTAINER */
.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

/* HEADER */
.logo {
  width: 100px;
  border-radius: 50%;
  margin-top: 20px;
}

h1 {
  margin-top: 15px;
  font-size: 26px;
  font-weight: bold;
}

.tagline {
  font-size: 14px;
  color: #cbd5f5;
  margin-bottom: 20px;
}

/* HERO IMAGE */
.hero {
  width: 100%;
  border-radius: 12px;
  margin-bottom: 20px;
}

/* BUTTON */
.btn {
  display: block;
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 10px;
  text-decoration: none;
  font-weight: bold;
  transition: 0.2s;
}

.btn:hover {
  transform: scale(1.03);
}

/* BUTTON COLORS */
.wa {
  background: #25D366;
  color: white;
}

.channel {
  background: #128C7E;
  color: white;
}

.tiktok {
  background: black;
  color: white;
}

/* SECTION */
.section {
  margin-top: 25px;
}

.section h2 {
  margin-bottom: 10px;
  font-size: 18px;
}

/* GALLERY */
.gallery img {
  width: 100%;
  border-radius: 10px;
  margin: 8px 0;
}

/* FOOTER */
.footer {
  margin-top: 30px;
  font-size: 12px;
  color: #94a3b8;
}
</style>

</head>
<body>

<div class="container">

  <!-- LOGO -->
  <img src="logo.png" class="logo">

  <h1>LENSTORE</h1>
  <p class="tagline">Jual Tools HayDay Murah & Aman</p>

  <!-- HERO IMAGE -->
  <img src="hero.jpg" class="hero">

  <!-- CTA BUTTONS -->
  <a href="https://wa.me/628XXXXXXXXXX" class="btn wa">💬 Chat WhatsApp</a>
  <a href="https://whatsapp.com/channel/XXXXX" class="btn channel">📢 Saluran WhatsApp</a>
  <a href="https://tiktok.com/@username" class="btn tiktok">🎵 TikTok</a>

  <!-- PRODUK -->
  <div class="section">
    <h2>Produk Kami</h2>
    <div class="gallery">
      <img src="produk1.jpg">
      <img src="produk2.jpg">
      <img src="produk3.jpg">
    </div>
  </div>

  <!-- KEUNGGULAN -->
  <div class="section">
    <h2>Kenapa Pilih Kami?</h2>
    <p>✔ Fast Respon</p>
    <p>✔ Aman & Terpercaya</p>
    <p>✔ Harga Murah</p>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    © LENSTORE 2026
  </div>

</div>

</body>
</html>
