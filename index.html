<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LENSTORE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* BACKGROUND */
body {
  font-family: 'Poppins', sans-serif;
  background: url('background.jpg') no-repeat center center fixed;
  background-size: cover;
  color: white;
}

/* OVERLAY */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.2);
  z-index: -1;
}

/* CONTAINER (70% + SUPER TRANSPARAN) */
.container {
  width: 90%;
  max-width: 500px;
  margin: 30px auto;
  padding: 20px;

  background: rgba(255,255,255,0.05); /* sangat transparan */
  backdrop-filter: blur(6px);

  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.1);
}

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 20px;
}

.header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 34px;
  font-weight: 900;
  color: #ff4da6;
}

.header p {
  font-size: 14px;
  color: #f1f5f9;
}

/* HERO */
.hero img {
  width: 100%;
  border-radius: 14px;
  margin-bottom: 10px;
}

/* BUTTON */
.btn {
  display: block;
  text-align: center;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  text-decoration: none;
  font-weight: 600;
  font-size: 14px;
}

.wa { background: #ff4da6; color: white; }
.channel { background: #ec4899; color: white; }
.tiktok { background: #be185d; color: white; }

/* SECTION */
.section {
  margin-top: 25px;
}

.section h2 {
  text-align: center;
  margin-bottom: 10px;
}

/* GRID MADING */
.product {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

/* FOTO KECIL */
.product img {
  width: 100%;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.product img:hover {
  transform: scale(1.05);
}

/* LIGHTBOX */
.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 99;
}

.lightbox img {
  max-width: 90%;
  max-height: 80%;
  border-radius: 12px;
}

/* TEXT */
.section p {
  text-align: center;
  font-size: 14px;
}

/* CTA */
.cta {
  position: fixed;
  bottom: 0;
  width: 100%;
  max-width: 500px;
  left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(135deg, #ff4da6, #ff1f7a);
  text-align: center;
  padding: 14px;
  font-weight: bold;
  color: white;
  text-decoration: none;
}

/* SPACER */
.spacer {
  height: 70px;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <h1>LENSTORE</h1>
    <p>HayDay Tools • Gold • Jasa • Promo Harian</p>
  </div>

  <div class="hero">
    <img src="produk1.png">
  </div>

  <a href="https://wa.me/6285269368022" class="btn wa">Chat WhatsApp</a>
  <a href="#" class="btn channel">Saluran WhatsApp</a>
  <a href="#" class="btn tiktok">TikTok</a>

  <div class="section">
    <h2>🔥 Produk & Promo</h2>

    <div class="product">
      <img src="produk2.png" onclick="openImg(this.src)">
      <img src="produk3.png" onclick="openImg(this.src)">
      <img src="produk4.png" onclick="openImg(this.src)">
      <img src="produk5.png" onclick="openImg(this.src)">
    </div>
  </div>

  <div class="section">
    <h2>Kenapa Pilih Kami?</h2>
    <p>✔ Fast Respon</p>
    <p>✔ Aman & Terpercaya</p>
    <p>✔ Harga Murah</p>
  </div>

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeImg()">
  <img id="lightbox-img">
</div>

<a href="https://wa.me/6285269368022" class="cta">
Order Sekarang
</a>

<div class="spacer"></div>

<script>
function openImg(src){
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightbox-img").src = src;
}

function closeImg(){
  document.getElementById("lightbox").style.display = "none";
}
</script>

</body>
</html>
