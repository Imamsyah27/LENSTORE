<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LENSTORE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  background: url('background.jpg') no-repeat center center fixed;
  background-size: cover;
  color: white;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.2);
  z-index: -1;
}

/* CONTAINER */
.container {
  width: 90%;
  max-width: 500px;
  margin: 30px auto;
  padding: 20px;

  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(6px);

  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.1);
}

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 20px;
}

.header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 34px;
  font-weight: 900;
  color: #ff4da6;
}

.header p {
  font-size: 14px;
}

/* HERO */
.hero img {
  width: 100%;
  border-radius: 14px;
  margin-bottom: 10px;
}

/* BUTTON */
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;

  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  text-decoration: none;
  font-weight: 600;
}

.wa { background: #ff4da6; }
.channel { background: #ec4899; }
.tiktok { background: #be185d; }

/* SECTION */
.section {
  margin-top: 25px;
}

.section h2 {
  text-align: center;
  margin-bottom: 10px;
}

/* GRID PRODUK */
.product {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.product img {
  width: 100%;
  border-radius: 10px;
  cursor: pointer;
}

/* PAYMENT */
.payment {
  text-align: center;
}

.qris {
  width: 160px;
  margin-top: 10px;
  border-radius: 10px;
  cursor: pointer;
}

/* DOWNLOAD BUTTON */
.download-btn {
  margin-top: 10px;
  display: inline-block;
  background: #ff4da6;
  padding: 8px 14px;
  border-radius: 8px;
  text-decoration: none;
  color: white;
  font-size: 13px;
}

/* TRUST */
.trust p {
  text-align: center;
  font-size: 14px;
}

/* LIGHTBOX */
.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.lightbox img {
  max-width: 90%;
  border-radius: 12px;
}

.close {
  margin-top: 10px;
  background: #ff4da6;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
}

/* CTA */
.cta {
  position: fixed;
  bottom: 0;
  width: 100%;
  max-width: 500px;
  left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(135deg, #ff4da6, #ff1f7a);
  text-align: center;
  padding: 14px;
  font-weight: bold;
  text-decoration: none;
  color: white;
}

.spacer {
  height: 70px;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <h1>LENSTORE</h1>
    <p>HayDay Tools • Gold • Jasa • Promo Harian</p>
  </div>

  <div class="hero">
    <img src="produk1.png">
  </div>

  <a href="https://wa.me/6285269368022" class="btn wa">
    <i class="fab fa-whatsapp"></i> WhatsApp
  </a>

  <a href="#" class="btn channel">
    <i class="fa-solid fa-bullhorn"></i> Saluran
  </a>

  <a href="#" class="btn tiktok">
    <i class="fab fa-tiktok"></i> TikTok
  </a>

  <!-- PRODUK -->
  <div class="section">
    <h2>Produk & Promo</h2>
    <div class="product">
      <img src="produk2.png" onclick="openImg(this.src)">
      <img src="produk3.png" onclick="openImg(this.src)">
      <img src="produk4.png" onclick="openImg(this.src)">
      <img src="produk5.png" onclick="openImg(this.src)">
    </div>
  </div>

  <!-- PEMBAYARAN -->
  <div class="section payment">
    <h2>Metode Pembayaran</h2>
    <p>DANA / SHOPEE PAY / BRI</p>

    <img src="QRIS.png" class="qris" onclick="openImg(this.src)">

    <br>
    <a href="QRIS.png" download class="download-btn">
      Download QRIS
    </a>
  </div>

  <!-- TRUST -->
  <div class="section trust">
    <h2>Kenapa Pilih LENSTORE?</h2>
    <p>✔ Fast Respon</p>
    <p>✔ Aman & Terpercaya</p>
    <p>✔ Harga Murah</p>
  </div>

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeImg()">
  <img id="lightbox-img">
  <div class="close">Tutup</div>
</div>

<a href="https://wa.me/6285269368022" class="cta">
Order Sekarang
</a>

<div class="spacer"></div>

<script>
function openImg(src){
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightbox-img").src = src;
}

function closeImg(){
  document.getElementById("lightbox").style.display = "none";
}
</script>

</body>
</html>
