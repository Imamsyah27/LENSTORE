* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: radial-gradient(circle at top, #1e293b, #020617);
  color: #f1f5f9;
}

/* CONTAINER */
.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 20px;
}

.header h1 {
  font-size: 30px;
  font-weight: 800;
  background: linear-gradient(90deg, #22c55e, #4ade80);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.header p {
  font-size: 14px;
  color: #94a3b8;
}

/* HERO */
.hero img {
  width: 100%;
  border-radius: 16px;

}

/* BUTTON */
.btn {
  display: block;
  text-align: center;
  padding: 15px;
  margin: 12px 0;
  border-radius: 12px;
  text-decoration: none;
  font-weight: 600;
  letter-spacing: 0.5px;
  transition: all 0.25s ease;
  box-shadow: 0 6px 20px rgba(0,0,0,0.4);
}

.btn:hover {
  transform: translateY(-2px) scale(1.02);
  box-shadow: 0 10px 25px rgba(0,0,0,0.6);
}

/* BUTTON COLORS */
.wa {
  background: linear-gradient(135deg, #25D366, #16a34a);
  color: white;
}

.channel {
  background: linear-gradient(135deg, #0ea5e9, #0284c7);
  color: white;
}

.tiktok {
  background: linear-gradient(135deg, #111827, #000000);
  color: white;
}

/* SECTION */
.section {
  margin-top: 30px;
}

.section h2 {
  font-size: 20px;
  margin-bottom: 15px;
  text-align: center;
  font-weight: 700;
  color: #e2e8f0;
}

/* PRODUCT IMAGE */
.product img {
  width: 100%;
  border-radius: 14px;
  margin-bottom: 14px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.5);
  transition: 0.25s;
}

.product img:hover {
  transform: scale(1.02);
}

/* KEUNGGULAN */
.section p {
  text-align: center;
  margin: 6px 0;
  color: #cbd5f5;
}

/* CTA FIXED */
.cta-fixed {
  position: fixed;
  bottom: 0;
  width: 100%;
  max-width: 420px;
  left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(135deg, #22c55e, #16a34a);
  text-align: center;
  padding: 14px;
  font-weight: 700;
  text-decoration: none;
  color: white;
  border-top-left-radius: 14px;
  border-top-right-radius: 14px;
  box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
}

/* FOOTER */
.footer {
  margin-top: 30px;
  text-align: center;
  font-size: 12px;
  color: #64748b;
}

/* SPACING */
.spacer {
  height: 80px;
}
