<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LENSTORE - HayDay Shop</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #0f172a;
  color: white;
}

/* CONTAINER */
.container {
  max-width: 420px;
  margin: auto;
  padding: 15px;
}

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 15px;
}

.header h1 {
  font-size: 26px;
  color: #22c55e;
}

.header p {
  font-size: 14px;
  color: #cbd5f5;
}

/* HERO */
.hero img {
  width: 100%;
  border-radius: 12px;
}

/* BUTTON */
.btn {
  display: block;
  text-align: center;
  padding: 14px;
  margin: 10px 0;
  border-radius: 10px;
  text-decoration: none;
  font-weight: bold;
  transition: 0.2s;
}

.btn:hover {
  transform: scale(1.03);
}

.wa {
  background: #25D366;
}

.channel {
  background: #128C7E;
}

.tiktok {
  background: black;
}

/* SECTION */
.section {
  margin-top: 20px;
}

.section h2 {
  font-size: 18px;
  margin-bottom: 10px;
  text-align: center;
}

/* PRODUCT IMAGE */
.product img {
  width: 100%;
  border-radius: 12px;
  margin-bottom: 12px;
}

/* CTA FIXED */
.cta-fixed {
  position: fixed;
  bottom: 0;
  width: 100%;
  max-width: 420px;
  left: 50%;
  transform: translateX(-50%);
  background: #25D366;
  text-align: center;
  padding: 12px;
  font-weight: bold;
  text-decoration: none;
  color: white;
  border-top-left-radius: 12px;
  border-top-right-radius: 12px;
}

/* SPACING */
.spacer {
  height: 70px;
}
</style>

</head>
<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <h1>LENSTORE</h1>
    <p>HayDay Tools • Gold • Jasa • Promo Harian</p>
  </div>

  <!-- HERO (PAKAI GAMBAR TERKUAT) -->
  <div class="hero">
    <img src="produk1.png">
  </div>

  <!-- CTA UTAMA -->
  <a href="https://wa.me/628XXXXXXXXXX" class="btn wa">💬 Chat WhatsApp</a>
  <a href="https://whatsapp.com/channel/XXXXX" class="btn channel">📢 Saluran WhatsApp</a>
  <a href="https://tiktok.com/@username" class="btn tiktok">🎵 TikTok</a>

  <!-- PRODUK -->
  <div class="section">
    <h2>🔥 Produk & Promo</h2>

    <div class="product">
      <img src="produk2.png">
      <img src="produk3.png">
      <img src="produk4.png">
      <img src="produk5.png">
    </div>
  </div>

</div>

<!-- CTA FIXED (SELALU MUNCUL DI BAWAH) -->
<a href="https://wa.me/628XXXXXXXXXX" class="cta-fixed">
  🚀 Order Sekarang via WhatsApp
</a>

<div class="spacer"></div>

</body>
</html>

  <!-- FOOTER -->
  <div class="footer">

</div>

</body>
</html>
